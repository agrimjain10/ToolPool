services:
  - type: web
    name: toolpool
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm install --prefix client && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: NODE_VERSION
        value: 20